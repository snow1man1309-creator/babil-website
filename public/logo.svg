<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 100" fill="currentColor" stroke="currentColor">
  <!-- Geometric Wing Icon -->
  <g stroke="none">
    <!-- Top Blade -->
    <polygon points="10,35 100,5 85,25 30,45 10,38" />
    <!-- Middle Blade -->
    <polygon points="10,43 30,50 85,30 70,55 30,70 10,63" />
    <!-- Bottom Left -->
    <polygon points="10,68 26,74 26,95 10,85" />
    <!-- Bottom Right -->
    <polygon points="30,76 62,64 47,89 30,95" />
  </g>

  <!-- Custom Typography: BΛBΞL -->
  <g stroke-width="9" stroke-linecap="butt" stroke-linejoin="miter" stroke-miterlimit="10" fill="none">
    <!-- B -->
    <path d="M 130,20 L 155,20 A 15,15 0 0 1 170,35 A 15,15 0 0 1 155,50 L 130,50" />
    <path d="M 130,50 L 160,50 A 15,15 0 0 1 175,65 A 15,15 0 0 1 160,80 L 130,80" />
    <line x1="130" y1="20" x2="130" y2="80" />

    <!-- Λ (Lambda with inward bottom stroke) -->
    <polyline points="200,80 225,20 250,80 225,80" />

    <!-- B -->
    <path d="M 280,20 L 305,20 A 15,15 0 0 1 320,35 A 15,15 0 0 1 305,50 L 280,50" />
    <path d="M 280,50 L 310,50 A 15,15 0 0 1 325,65 A 15,15 0 0 1 310,80 L 280,80" />
    <line x1="280" y1="20" x2="280" y2="80" />

    <!-- Ξ (Xi / Custom E) -->
    <line x1="350" y1="20" x2="390" y2="20" />
    <line x1="350" y1="50" x2="390" y2="50" />
    <line x1="350" y1="80" x2="390" y2="80" />
    <line x1="370" y1="20" x2="370" y2="80" />

    <!-- L -->
    <polyline points="420,20 420,80 460,80" />
  </g>
</svg>
